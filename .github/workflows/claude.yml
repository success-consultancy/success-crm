name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR comprehensively:
            
            1. Code Quality - best practices, readability
            2. Security - vulnerabilities, data exposure
            3. Performance - bottlenecks, optimizations
            4. Testing - coverage, edge cases
            5. Documentation - clarity, completeness
            
            Provide specific, actionable feedback with code suggestions.
          claude_args: |
            --max-turns 10
            --model claude-sonnet-4-5-20250929
